inherit_mode:
  merge:
    - Exclude

require:
  - standard

plugins:
  - standard-custom
  - standard-performance
  - rubocop-performance
  - rubocop-rspec
  - rubocop-thread_safety

inherit_gem:
  standard: config/base.yml
  standard-performance: config/base.yml
  standard-custom: config/base.yml

AllCops:
  SuggestExtensions: false
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - gemfiles/**/*
    - bin/**/*
    - db/**/*

    - vendor/**/*
    - tmp/**/*
    - log/**/*
    - storage/**/*
    - coverage/**/*
    - uploads/**/*
    - .git/**/*
    - node_modules/**/*
    - public/packs/**/*
    - public/packs-test/**/*

# RSpec-specific configuration
RSpec/ExampleLength:
  Max: 80

RSpec/SpecFilePathFormat:
  Enabled: false
  Exclude:
    - spec/**/*

RSpec/HooksBeforeExamples:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Max: 16

RSpec/NestedGroups:
  Max: 4

RSpec/RepeatedExample:
  Enabled: false

RSpec/LeakyConstantDeclaration:
  Exclude:
    - spec/**/*

RSpec/DescribeClass:
  Exclude: []

RSpec/DescribedClass:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/AnyInstance:
  Enabled: false

RSpec/NamedSubject:
  Enabled: false

RSpec/NoExpectationExample:
  Enabled: false

RSpec/MessageSpies:
  Enabled: false

RSpec/MultipleDescribes:
  Enabled: false

RSpec/RepeatedExampleGroupDescription:
  Enabled: false

RSpec/RepeatedDescription:
  Enabled: false

RSpec/StubbedMock:
  Enabled: false

RSpec/ExpectActual:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

# Custom cop overrides
Style/AccessModifierDeclarations:
  EnforcedStyle: inline

Style/FrozenStringLiteralComment:
  Enabled: false

Lint/UselessAssignment:
  Enabled: false

ThreadSafety/ClassAndModuleAttributes:
  Enabled: false

ThreadSafety/ClassInstanceVariable:
  Enabled: false

ThreadSafety/DirChdir:
  Exclude:
    - "*.gemspec"

# Strict cops that should never be disabled
Lint/Debugger:
  Enabled: true
  Exclude: []

RSpec/Focus:
  Enabled: true
  Exclude: []

Metrics/AbcSize:
  Enabled: true
  Max: 15
  CountRepeatedAttributes: false
  Exclude:
    - lib/activeadmin/batched_export/controller_methods.rb
    - lib/activeadmin/batched_export/export_macro_catalog.rb
    - lib/activeadmin/batched_export/install.rb
Metrics/CyclomaticComplexity:
  Enabled: true
  Max: 10
  Exclude:
    - lib/activeadmin/batched_export/controller_methods.rb
    - lib/activeadmin/batched_export/export_macro_catalog.rb
    - lib/activeadmin/batched_export/install.rb
Metrics/PerceivedComplexity:
  Enabled: true
  Max: 10
  Exclude:
    - lib/activeadmin/batched_export/controller_methods.rb
    - lib/activeadmin/batched_export/export_macro_catalog.rb
    - lib/activeadmin/batched_export/install.rb
Lint/ConstantDefinitionInBlock:
  Exclude:
    - spec/**/*

Metrics/ModuleLength:
  Enabled: true
  CountAsOne: [array, hash, heredoc, method_call]
  Max: 150
  Exclude:
    - lib/activeadmin/batched_export/controller_methods.rb
Metrics/ClassLength:
  Enabled: true
  CountAsOne: [array, hash, heredoc, method_call]
  Max: 150
